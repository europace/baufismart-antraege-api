name: Pull Request on Branch Push
on:
  push:
    branches:
      - "publish/*"

permissions: {}

jobs:
  ensure-pinned:
    name: Ensure SHA-pinned actions
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 1
      - uses: zgosalvez/github-actions-ensure-sha-pinned-actions@3db98c0363e2fa5df3e1c4c471777a7c10b24cc9 # v5.0.5
        with:
          allowlist: |
            europace/

  pull-request:
    needs: ensure-pinned
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.BEV_CODE_COMMITTER_APP_ID }}
          private-key: ${{ secrets.BEV_CODE_COMMITTER_PRIVATE_KEY }}
      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          BRANCH: ${{ github.ref_name }}
        run: |
          LAST_VERSION=$(gh api repos/${{ github.repository }}/tags --jq '.[0].name | ltrimstr("v")')
          MAJOR=$(echo "$LAST_VERSION" | cut -d. -f1)
          MINOR=$(echo "$LAST_VERSION" | cut -d. -f2)
          NEXT_VERSION="$MAJOR.$((MINOR + 1))"
          gh pr create \
            --repo "${{ github.repository }}" \
            --head "$BRANCH" \
            --base master \
            --title "Release $NEXT_VERSION - " \
            --body "> Describe the new feature or API change here."
