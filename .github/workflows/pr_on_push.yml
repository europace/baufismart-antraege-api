name: Pull Request on Branch Push
on:
  push:
    branches:
      - "publish/*"

permissions: {}

jobs:
  ensure-pinned:
    name: Ensure SHA-pinned actions
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 1
      - uses: zgosalvez/github-actions-ensure-sha-pinned-actions@ca46236c6ce584ae24bc6283ba8dcf4b3ec8a066 # v5.0.4
        with:
          allowlist: |
            europace/

  pull-request:
    needs: ensure-pinned
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ vars.BEV_CODE_COMMITTER_APP_ID }}
          private-key: ${{ secrets.BEV_CODE_COMMITTER_PRIVATE_KEY }}
      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          BRANCH: ${{ github.ref_name }}
        run: |
          LAST_VERSION=$(gh api repos/${{ github.repository }}/tags --jq '.[0].name | ltrimstr("v")')
          MAJOR=$(echo "$LAST_VERSION" | cut -d. -f1)
          MINOR=$(echo "$LAST_VERSION" | cut -d. -f2)
          NEXT_VERSION="$MAJOR.$((MINOR + 1))"
          gh pr create \
            --repo "${{ github.repository }}" \
            --head "$BRANCH" \
            --base master \
            --title "Release $NEXT_VERSION - " \
            --body "> Describe the new feature or API change here."
